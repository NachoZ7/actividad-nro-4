<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro - Desarrollo A</title>
    <link href="./formulario.css" rel="stylesheet">
    <script src="./formulario.js" defer></script>
</head>

<body>
    <main>
        <section class="section-formulario">
            <form class="form-form" id="form-registro" action="../Desarrollador B/resultado.html" method="GET">

                <div class="grupo-input">
                    <label for="nombre">Nombre completo: <span>(*)</span></label>
                    <input type="text" id="nombre" name="nombre" placeholder="Mínimo 5 caracteres" required>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail: <span>(*)</span></label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="grupo-input">
                    <label for="edad">Edad: <span>(*)</span></label>
                    <input type="number" id="edad" name="edad" placeholder="Entre 18 y 60 años" required>
                </div>

                <div class="grupo-input">
                    <label for="pais">País: <span>(*)</span></label>
                    <select id="pais" name="pais" required>
                        <option value="" disabled selected>Selecciona tu país</option>
                        <option value="Alemania">Alemania</option>
                        <option value="Argentina">Argentina</option>
                        <option value="Bolivia">Bolivia</option>
                        <option value="Brasil">Brasil</option>
                        <option value="Chile">Chile</option>
                        <option value="Colombia">Colombia</option>
                        <option value="España">España</option>
                        <option value="Estonia">Estonia</option>
                        <option value="Estados Unidos">Estados Unidos</option>
                        <option value="México">México</option>
                        <option value="Paraguay">Paraguay</option>
                        <option value="Perú">Perú</option>
                        <option value="Uruguay">Uruguay</option>
                        <option value="Venezuela">Venezuela</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>

                <div class="grupo-checkbox">
                    <input type="checkbox" id="terminos" name="terminos" value="aceptado" required>
                    <label for="terminos">Acepto los términos y condiciones <span>(*)</span></label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-ingresar">Enviar Datos</button>
                    <button type="reset" class="btn-limpiar">Limpiar</button>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
