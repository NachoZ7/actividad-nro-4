<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos Recibidos - Desarrollo B</title>
    <link href="./resultado.css" rel="stylesheet">
    <script src="./receptor.js" defer></script>
</head>

<body>
    <main>
        <section class="section-formulario">
            <h2 style="font-size: 2.4rem; color: #0c1735; margin-bottom: 2.5rem; border-bottom: 0.2rem solid #3B82F6; padding-bottom: 1rem;">
                Información del Usuario Receptada
            </h2>

            <div class="form-form" id="contenedor-datos">
                <div class="grupo-input">
                    <label>Nombre Completo:</label>
                    <input type="text" id="res-nombre" readonly>
                </div>

                <div class="grupo-input">
                    <label>E-mail:</label>
                    <input type="text" id="res-email" readonly>
                </div>

                <div class="grupo-input">
                    <label>Edad:</label>
                    <input type="text" id="res-edad" readonly>
                </div>

                <div class="grupo-input">
                    <label>País:</label>
                    <input type="text" id="res-pais" readonly>
                </div>

                <div class="grupo-input">
                    <label>Estado de Términos:</label>
                    <input type="text" id="res-terminos" readonly>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 3rem;">
                <a href="../Desarrollador A/formulario.html" class="btn-limpiar" style="text-decoration: none; text-align: center;">Volver al Formulario</a>
            </div>
        </section>
    </main>
</body>

</html>
